name: Android CD (Release)

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode Android Keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload.jks

      - name: Build Android Release APK & AAB
        run: |
          cd android
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Building signed release build..."
            ./gradlew assembleRelease bundleRelease \
              -PMYAPP_RELEASE_STORE_FILE=upload.jks \
              -PMYAPP_RELEASE_STORE_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
              -PMYAPP_RELEASE_KEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}" \
              -PMYAPP_RELEASE_KEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}" \
              --no-daemon
          else
            echo "Keystore secret missing. Building unsigned/debug-signed release build (dry-run mode)..."
            ./gradlew assembleRelease bundleRelease --no-daemon
          fi

      - name: Clean Keystore File
        if: always()
        run: |
          rm -f android/app/upload.jks

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            Braintune Kids Game Release ${{ github.ref_name }}
            
            Check the [CHANGELOG.md](CHANGELOG.md) for changes included in this release.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release AAB to Google Play
        uses: r0adkll/upload-google-play@v1
        if: ${{ env.PLAY_SERVICE_ACCOUNT_JSON != '' }}
        with:
          serviceAccountJsonPlainText: ${{ env.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.braintune
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
